name: Workflow For Deploying Terraform on Azure
on:
  push:
    branches:
      - aws-dev
    paths-ignore:
      - 'README.md'

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: "us-east-1"
  TERRAFORM_DESTROY: "NO"

jobs:
  terraform-initiate:
    if: ${{ vars.TERRAFORM_DESTROY == 'NO' && ${GITHUB_REF} == 'refs/heads/aws-dev' }}
    name: 'Terraform Initialization'
    runs-on: ubuntu-latest
    steps:
       - name: Checkout
         uses: actions/checkout@v2
       - name: Setup Terraform
         uses: hashicorp/setup-terraform@v1
         with:
           terraform_version: 1.9.8
       - name: Terraform Version Check
         run: terraform version && echo $(hostname)

  terraform-plan:
    if: ${{ vars.TERRAFORM_DESTROY == 'NO' && ${GITHUB_REF} == 'refs/heads/aws-dev' }}
    name: 'Terraform Plan'
    runs-on: ubuntu-latest
    needs: terraform-initiate
    defaults:
      run:
        working-directory: ./aws-tfcode
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.9.8  
      - name: Terraform Init, Format, Validate
        run: terraform init && terraform fmt && terraform validate && echo $(hostname)
      - name: Print Branch Reference
        run: echo "The Current Branch Is $GITHUB_REF"
      - name: Terraform Plan
        if: env.TERRAFORM_DESTROY == 'NO'
        run: |
          if [ ${GITHUB_REF} == 'refs/heads/aws-dev' ]; then
            echo "Running Terraform Plan For Development Environment"
            terraform plan 
          fi 
  terraform-apply:
    if: ${{ vars.TERRAFORM_DESTROY == 'NO' && ${GITHUB_REF} == 'refs/heads/aws-dev' }}
    name: 'Terraform Apply'
    runs-on: ubuntu-latest
    needs: terraform-plan
    defaults:
      run:
        working-directory: ./aws-tfcode
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.9.8
      - name: Print Branch Reference
        run: echo The Current Branch Is $GITHUB_REF
      - name: Terraform Init
        run: terraform init && echo $(hostname)
      - name: Terraform Apply
        if: env.TERRAFORM_DESTROY == 'NO'
        run: |
          if [ ${GITHUB_REF} == 'refs/heads/aws-dev' ]; then
            echo "Running Terraform Apply  For Development Environment"
            terraform apply --auto-approve
            terraform state list 
          fi  
  terraform-destroy:
    if: ${{ vars.TERRAFORM_DESTROY == 'YES' && ${GITHUB_REF} == 'refs/heads/aws-dev' }}
    name: 'Terraform Destroy'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./aws-tfcode
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.9.8
      - name: Print Branch Reference
        run: echo The Current Branch Is $GITHUB_REF
      - name: Terraform Destroy
        if: env.TERRAFORM_DESTROY == 'YES'
        run: |
          if [ ${GITHUB_REF} == 'refs/heads/dev' ]; then
            echo "Running Terraform Destroy For Development Environment"
            terraform init && terraform destroy --auto-approve
          fi         