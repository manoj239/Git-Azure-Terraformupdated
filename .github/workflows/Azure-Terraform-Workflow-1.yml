name: Workflow For Deploying Terraform on Azure
on:
  push:
    branches:
      - dev
      - prod
    paths-ignore:
      - 'README.md'

env:
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  TERRAFORM_DESTROY: "NO"

jobs:
  terraform-initiate:
    if: ${{ vars.TERRAFORM_DESTROY == 'NO' }}
    name: 'Terraform Initialization'
    runs-on: ubuntu-latest
    steps:
       - name: Checkout
         uses: actions/checkout@v2
       - name: Setup Terraform
         uses: hashicorp/setup-terraform@v1
         with:
           terraform_version: 1.9.8
       - name: Terraform Version Check
         run: terraform version
 
  terraform-plan:
    if: ${{ vars.TERRAFORM_DESTROY == 'NO' }}
    name: 'Terraform Plan'
    runs-on: ubuntu-latest
    needs: terraform-initiate
    defaults:
      run:
        #working-directory: ./Customer_Alpha
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.9.8  
      - name: Terraform Init, Format, Validate
        run: terraform init && terraform fmt && terraform validate
      - name: Print Branch Reference
        run: echo "The Current Branch Is $GITHUB_REF"
      - name: Terraform Plan
        if: env.TERRAFORM_DESTROY == 'NO'
        run: |
          if [ ${GITHUB_REF} == "refs/heads/dev" ]; then
            echo "Running Terraform Plan For Development Environment"
            terraform plan 
          fi 
  # terraform-apply:
 
  # terraform-destroy:

      
